<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Job Navigator</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <link rel="stylesheet" href="assets/ai-agent/styles/widget.css" />
  </head>
  <body>
    <div id="inviteOverlay" class="overlay" aria-hidden="false">
      <div class="overlay-card">
        <h1>访问验证</h1>
        <p>输入邀请码后继续访问岗位导航。</p>
        <div class="invite-qr-hint" aria-label="邀请码获取提示">
          <p class="invite-qr-title">华工校友扫码加入社群获取邀请码</p>
          <img src="assets/社群二维码.png" alt="华工校友社群二维码" class="invite-qr-image" loading="lazy" />
        </div>
        <form id="inviteForm" class="invite-form">
          <input id="inviteInput" type="password" placeholder="请输入邀请码" autocomplete="off" required />
          <button type="submit">进入</button>
        </form>
        <p id="inviteError" class="hint error"></p>
      </div>
    </div>

    <div class="bg-gradient"></div>

    <main class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">Job Info Collector</p>
          <h1>三月校招实习岗位</h1>
          <p class="subtitle">数据源来自各大招聘官网，招聘数据禁止商用</p>
          <div class="top-views" role="tablist" aria-label="页面视图切换">
            <button id="viewJobsTab" type="button" class="view-tab is-active" role="tab" aria-selected="true">岗位列表</button>
            <button id="viewCalendarTab" type="button" class="view-tab" role="tab" aria-selected="false">华工3月宣讲行程</button>
          </div>
        </div>
        <div class="hero-metrics">
          <div class="metric">
            <span class="label">当前状态</span>
            <strong id="loadStateText">准备中</strong>
          </div>
          <div class="metric">
            <span class="label">数据更新时间</span>
            <strong id="updatedAtText">-</strong>
          </div>
          <div class="metric">
            <span class="label">匹配岗位</span>
            <strong id="resultCountText">0</strong>
          </div>
        </div>
      </header>

      <div id="jobsView">
        <div class="jobs-layout">
          <button
            id="mobileFilterToggle"
            class="mobile-filter-toggle"
            type="button"
            aria-controls="filtersSidebar"
            aria-expanded="false"
          >
            ▶
          </button>

          <aside id="filtersSidebar" class="filters-sidebar">
            <section class="sidebar-block">
              <h3>筛选目录</h3>
              <p id="companyTreeSummary" class="sidebar-hint">按公司展开项目与类别（均支持多选）。</p>
              <div id="companyTreeFilter" class="company-tree"></div>
            </section>

            <section class="sidebar-block">
              <h3>城市筛选</h3>
              <details id="cityFilter" class="city-multi" data-open="false">
                <summary id="cityFilterSummary" class="city-multi-summary">全部城市</summary>
                <div class="city-multi-panel">
                  <div id="cityPrimaryOptions" class="city-options-grid"></div>
                  <details id="cityOtherCities" class="city-other-cities">
                    <summary>其他城市</summary>
                    <div id="cityOtherOptions" class="city-options-grid city-options-other"></div>
                  </details>
                </div>
              </details>
            </section>

            <section class="sidebar-block sidebar-actions">
              <select id="sortBy">
                <option value="publish_time">按发布时间</option>
                <option value="relevance">按相关度</option>
              </select>
              <button id="clearFilters" type="button" class="ghost">清空条件</button>
              <button id="overviewEntry" type="button" class="chip">数据概览（即将上线）</button>
            </section>
          </aside>

          <section class="jobs-main-panel">
            <section class="toolbar">
              <div class="search-wrap">
                <input id="searchInput" type="search" placeholder="搜索岗位标题 / 职责 / 要求 / 加分项" />
              </div>
              <div class="toolbar-footer">
                <span class="source-note">数据来源：聚合校招站点，点击卡片可跳转原始岗位。</span>
              </div>
            </section>

            <section class="status-panel">
              <p id="statusMessage">正在初始化...</p>
            </section>

            <section id="listContainer" class="card-list" aria-live="polite"></section>

            <section class="actions">
              <button id="loadMoreBtn" type="button">加载更多</button>
            </section>
          </section>
        </div>
      </div>

      <section id="calendarView" class="calendar-view is-hidden-view" aria-live="polite">
        <div class="calendar-panel">
          <div class="calendar-head">
            <h2 id="calendarMonthLabel">本月宣讲日历</h2>
            <p id="calendarMeta" class="calendar-meta">点击日期卡片查看完整宣讲信息</p>
          </div>
          <div class="calendar-weekdays">
            <span>日</span>
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </div>
      </section>
    </main>

    <div id="calendarModal" class="calendar-modal is-hidden" aria-hidden="true">
      <div class="calendar-modal-mask" data-role="close-modal"></div>
      <div class="calendar-modal-card" role="dialog" aria-modal="true" aria-labelledby="calendarModalTitle">
        <button id="calendarModalClose" type="button" class="calendar-modal-close" aria-label="关闭">×</button>
        <h3 id="calendarModalTitle">当日宣讲安排</h3>
        <div id="calendarModalBody" class="calendar-modal-body"></div>
      </div>
    </div>

    <template id="jobCardTpl">
      <article class="job-card">
        <header>
          <h3 class="title"></h3>
          <a class="detail-link" target="_blank" rel="noreferrer noopener">查看详情</a>
        </header>
        <div class="meta-inline">
          <span class="meta-chip"><span class="meta-label">公司</span><span class="meta-value" data-field="company"></span></span>
          <span class="meta-chip"><span class="meta-label">项目</span><span class="meta-value" data-field="project"></span></span>
          <span class="meta-chip"><span class="meta-label">类别</span><span class="meta-value" data-field="category"></span></span>
          <span class="meta-chip"><span class="meta-label">城市</span><span class="meta-value" data-field="city"></span></span>
          <span class="meta-chip"><span class="meta-label">发布时间</span><span class="meta-value" data-field="publishTime"></span></span>
        </div>
        <div class="detail-sections">
          <section class="detail-block detail-block-primary">
            <h4>岗位职责</h4>
            <p data-field="responsibilities"></p>
          </section>
          <section class="detail-block detail-block-primary">
            <h4>岗位要求</h4>
            <p data-field="requirements"></p>
          </section>
          <section class="detail-block detail-block-full">
            <h4>加分项</h4>
            <p data-field="bonusPoints"></p>
          </section>
        </div>
      </article>
    </template>

    <script src="config/invite-codes.js"></script>
    <script type="module" src="assets/app.js"></script>
    <script type="module" src="assets/ai-agent/components/widget.js"></script>
  </body>
</html>
